<!DOCTYPE html>
<html>

<head>
    <title>Add Note</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2 class="mb-4">Add Note</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <input type="text" name="title" placeholder="Title" class="form-control" required>
        </div>

        <div class="mb-3">
            <textarea name="description" placeholder="Description" class="form-control" rows="4"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Attach File (optional — photo, PDF, doc...)</label>
            <input type="file" name="file" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Save Note</button>
        <a href="/dashboard/" class="btn btn-secondary ms-2">Cancel</a>

    </form>

</body>

</html>
